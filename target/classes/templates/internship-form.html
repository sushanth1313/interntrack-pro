<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle} + ' | InternTrack Pro'">Internship Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page-bg">
    <nav class="navbar glass">
        <a class="brand" th:href="@{/dashboard}">✦ InternTrack</a>
        <div class="nav-links">
            <a th:href="@{/dashboard}">Overview</a>
            <a class="active" th:href="@{/internships}">Tracker</a>
            <a th:href="@{/analytics}">Analytics</a>
            <form th:action="@{/logout}" method="post" class="inline-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="nav-button">Logout</button>
            </form>
        </div>
    </nav>

    <main class="container narrow">
        <section class="section-heading">
            <div>
                <p class="mini-badge">Tracker Form</p>
                <h1 th:text="${pageTitle}">Add Internship</h1>
                <p>Fill all important details for this application.</p>
            </div>
        </section>

        <section class="panel glass">
            <form th:action="@{/internships/save}" th:object="${internship}" method="post" class="form grid-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" th:field="*{id}"/>

                <div>
                    <label>Company Name</label>
                    <input type="text" th:field="*{companyName}" placeholder="Example: Google" required>
                </div>

                <div>
                    <label>Role</label>
                    <input type="text" th:field="*{role}" placeholder="Example: Software Intern" required>
                </div>

                <div>
                    <label>Location</label>
                    <input type="text" th:field="*{location}" placeholder="Bengaluru / Remote">
                </div>

                <div>
                    <label>Stipend</label>
                    <input type="text" th:field="*{stipend}" placeholder="₹20,000/month">
                </div>

                <div>
                    <label>Application Date</label>
                    <input type="date" th:field="*{applicationDate}">
                </div>

                <div>
                    <label>Deadline</label>
                    <input type="date" th:field="*{deadline}">
                </div>

                <div>
                    <label>Status</label>
                    <select th:field="*{status}">
                        <option value="APPLIED">Applied</option>
                        <option value="PENDING">Pending</option>
                        <option value="INTERVIEW">Interview</option>
                        <option value="SELECTED">Selected</option>
                        <option value="REJECTED">Rejected</option>
                    </select>
                </div>

                <div>
                    <label>Application Link</label>
                    <input type="url" th:field="*{applicationLink}" placeholder="https://careers.company.com">
                </div>

                <div class="full-span">
                    <label>Notes</label>
                    <textarea th:field="*{notes}" placeholder="Interview prep notes, follow-up date, resume version..."></textarea>
                </div>

                <div class="form-actions full-span">
                    <button class="btn" type="submit">Save Internship</button>
                    <a class="btn btn-secondary" th:href="@{/internships}">Cancel</a>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
