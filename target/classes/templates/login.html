<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login | InternTrack Pro</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page-bg auth-page">
    <nav class="navbar glass">
        <a class="brand" th:href="@{/}">✦ InternTrack</a>
        <div class="nav-links">
            <a th:href="@{/register}">Create Account</a>
        </div>
    </nav>

    <section class="auth-card glass">
        <div class="mini-badge">Welcome back</div>
        <h1>Sign In</h1>
        <p>Demo login: <b>demo@interntrack.com</b> / <b>demo123</b></p>

        <div class="alert success" th:if="${param.registered}">Account created successfully. Please login.</div>
        <div class="alert success" th:if="${param.logout}">Logged out successfully.</div>
        <div class="alert danger" th:if="${param.error}">Invalid email or password.</div>

        <form th:action="@{/login}" method="post" class="form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <label>Email Address</label>
            <input type="email" name="email" placeholder="you@example.com" required>

            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required>

            <button class="btn full" type="submit">Login</button>
        </form>

        <p class="center-text">No account? <a th:href="@{/register}">Create one</a></p>
    </section>
</div>
</body>
</html>
