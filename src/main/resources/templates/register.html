<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register | InternTrack Pro</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page-bg auth-page">
    <nav class="navbar glass">
        <a class="brand" th:href="@{/}">✦ InternTrack</a>
        <div class="nav-links">
            <a th:href="@{/login}">Sign In</a>
        </div>
    </nav>

    <section class="auth-card glass">
        <div class="mini-badge">Get started</div>
        <h1>Create Account</h1>
        <p>Join your internship tracking system.</p>

        <div class="alert danger" th:if="${error}" th:text="${error}"></div>

        <form th:action="@{/register}" th:object="${user}" method="post" class="form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <label>Full Name</label>
            <input type="text" th:field="*{name}" placeholder="Your name" required>

            <label>Email Address</label>
            <input type="email" th:field="*{email}" placeholder="you@example.com" required>

            <label>Password</label>
            <input type="password" th:field="*{password}" placeholder="Create password" required>

            <button class="btn full" type="submit">Create Account</button>
        </form>

        <p class="center-text">Already have an account? <a th:href="@{/login}">Sign in</a></p>
    </section>
</div>
</body>
</html>
